server:
  port: 7672

# Entity identifier
entity_id: "https://ta.example.lh"

# Signing configuration
# Note: alg, rsa_key_len, and key_rotation are managed in the database.
# Use 'lhmigrate config2db' to migrate these values, or the Admin API to manage them.
signing:
  kms: filesystem
  pk_backend: db
  auto_generate_keys: true
  filesystem:
    key_dir: "/data/keys"
  # For PKCS#11 HSM support:
  # kms: pkcs11
  # pkcs11:
  #   module_path: "/usr/lib/softhsm/libsofthsm2.so"
  #   token_label: "lighthouse"
  #   pin: "1234"
  #   storage_dir: "/data/pkcs11"

# Federation data
# Note: Most federation options are now managed in the database.
# Use 'lhmigrate config2db' to migrate these values from an existing config file.
federation_data:
  # The following options are now managed via 'lhmigrate config2db' or Admin API:
  # - authority_hints
  # - federation_entity_metadata
  # - constraints
  # - metadata_policy_crit
  # - configuration_lifetime

# Storage configuration
storage:
  driver: sqlite  # Options: sqlite, mysql, postgres
  data_dir: "/data"
  # For MySQL/PostgreSQL:
  # driver: postgres
  # dsn: "host=localhost user=lighthouse password=secret dbname=lighthouse"

# Admin API configuration
api:
  admin:
    enabled: true
    users_enabled: true
    # Port for admin API. 0 means serve on main server.
    port: 0
    # Admin users password hashing parameters (Argon2id). Defaults shown below.
    password_hashing:
      time: 1
      memory_kib: 65536
      parallelism: 4
      key_len: 64
      salt_len: 32

# Endpoints configuration
endpoints:
  fetch:
    path: "/fetch"
  list:
    path: "/list"
  resolve:
    path: "/resolve"
  entity_collection:
    path: "/entity-collection"
    allowed_trust_anchors:
      - "https://ta.example.org"
    interval: 8h
  trust_mark:
    path: "/trustmark"
    # DEPRECATED: trust_mark_specs should be managed via the Admin API.
    # Use 'lhmigrate config2db' to migrate existing specs from config.
    # Configure trust mark specs using:
    #   POST /admin/api/v1/trustmark-specs
  trust_mark_status:
    path: "/trustmark/status"
  trust_mark_list:
    path: "/trustmark/list"
  enroll:
    path: "/enroll"
    checker:
      type: multiple_or
      config:
        - type: trust_mark
          config:
            trust_mark_type: https://tm.example.org
            trust_anchors:
              - entity_id: https://ta.example.org
        - type: trust_mark
          config:
            trust_mark_type: https://tm.example.com
            trust_anchors:
              - entity_id: https://example.com
              - entity_id: https://foo.bar.com

